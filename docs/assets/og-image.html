<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    background: #0a0a0b;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Ambient glow */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(163, 230, 53, 0.06);
    filter: blur(120px);
    top: -100px;
    right: -100px;
  }

  .glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(163, 230, 53, 0.04);
    filter: blur(100px);
    bottom: -150px;
    left: -100px;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 80px;
  }

  h1 {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    color: #f5f5f5;
  }

  h1 span {
    color: #a3e635;
  }

  .subtitle {
    font-size: 24px;
    color: #a1a1aa;
    margin-top: 24px;
    font-weight: 400;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.4;
  }

  .pills {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .pill {
    background: #141416;
    color: #63636e;
    padding: 8px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
  }

  .pill.accent {
    background: rgba(163, 230, 53, 0.12);
    color: #a3e635;
  }

  /* Decorative grid dots */
  .dots {
    position: absolute;
    bottom: 32px;
    right: 40px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #28282c;
  }

  .github {
    position: absolute;
    bottom: 32px;
    left: 40px;
    color: #63636e;
    font-size: 16px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow-2"></div>

  <div class="content">
    <h1>Design <span>Taste</span> Lab</h1>
    <p class="subtitle">
      Extract, test, and codify your design taste into a reusable AI-ready spec
    </p>
    <div class="pills">
      <div class="pill accent">AI-Powered</div>
      <div class="pill">Claude + OpenAI</div>
      <div class="pill">Next.js</div>
      <div class="pill">Open Source</div>
    </div>
  </div>

  <div class="github">github.com/tyagicapx/design-taste-lab</div>

  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</body>
</html>
