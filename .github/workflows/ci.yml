name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (scripts blocked)
        run: npm ci --ignore-scripts

      - name: Rebuild allowed native modules
        run: npm rebuild puppeteer esbuild better-sqlite3 unrs-resolver

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DEMO_MODE: 'true'
